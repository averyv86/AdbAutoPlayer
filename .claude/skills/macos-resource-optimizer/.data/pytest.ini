[pytest]
# pytest configuration for macOS Resource Optimizer test suite

minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Async test support
asyncio_mode = auto

# Test markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    delegation: tests for command delegation to agents
    validation: tests for input/output validation
    error_handling: tests for error handling and resilience
    integration: integration tests covering complete workflows
    subprocess: tests using subprocess execution (UV scripts)
    performance: performance regression tests
    slow: marks tests as slow (deselect with '-m "not slow"')

# Coverage configuration
[coverage:run]
branch = True
source = .

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    @abstractmethod
    @abc.abstractmethod

# Ignore these patterns in coverage
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
